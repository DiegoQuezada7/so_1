events { 
    worker_connections 1024; 
}

http {
    # Configuración para mapear las cabeceras requeridas por WebSockets
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        # Área 1: Sistema de Tickets y Llamados (HTTP y WebSockets)
        location /tickets/ {
            proxy_pass http://micro-tickets:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        # Área 2: Procesamiento Lab y Maquinaria IoT
        location /laboratorio/ {
            proxy_pass http://micro-laboratorio:4000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }
    }
}